name: ci-cd

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/cidc.yaml'

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: asherif310/python-test:${{ steps.vars.outputs.short_sha }}

  update-manifest:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Or a Personal Access Token if rules require it

      - name: Update Image Tag in Helm values
        run: |
          # Modifies the tag value directly inside your values.yaml
          sed -i 's/tag: .*/tag: "${{ needs.ci.outputs.short_sha }}"/' charts/python-test/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/python-test/values.yaml
          git commit -m "chore: update image tag to ${{ needs.ci.outputs.short_sha }} [skip ci]"
          git push

  cd:
    needs: update-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        env:
          ARGOCD_VERSION: v2.13.3
        run: |
          if ! command -v argocd &>/dev/null || [[ "$(argocd version --client --short 2>/dev/null)" != *"$ARGOCD_VERSION"* ]]; then
            mkdir -p "$HOME/.local/bin"
            curl -sSL -o "$HOME/.local/bin/argocd" \
              "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
            chmod +x "$HOME/.local/bin/argocd"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: argocd app sync
        run: |
          argocd app sync python-test --grpc-web --insecure --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} --server ${{ secrets.ARGOCD_SERVER }}