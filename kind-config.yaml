apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  # Mount the corporate CA cert into each node at creation time.
  # Export your cert first:
  #   $cert = Get-Item "Cert:\LocalMachine\Root\<THUMBPRINT>"
  #   "-----BEGIN CERTIFICATE-----`n" + [Convert]::ToBase64String($cert.RawData,'InsertLineBreaks') + "`n-----END CERTIFICATE-----" | Out-File -Encoding ascii corp-ca.crt
  extraMounts:
  - hostPath: ./corp-ca.crt
    containerPath: /usr/local/share/ca-certificates/corp-ca.crt
kubeadmConfigPatches:
- |
  kind: InitConfiguration
  nodeRegistration:
    kubeletExtraArgs:
      # Tells containerd to refresh its CA trust store before pulling
      image-pull-progress-deadline: "5m"
containerdConfigPatches:
- |-
  [plugins."io.containerd.grpc.v1.cri".registry]
    config_path = "/etc/containerd/certs.d"
