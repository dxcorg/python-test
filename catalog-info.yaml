apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: python-test
  description: A sample Flask API service exposing /api/v1/details and /api/v1/health
  annotations:
    # Replace with your actual SCM URL, e.g. github.com/org/repo
    backstage.io/source-location: url:https://github.com/ahmed-shereif/python-test
    # Kubernetes namespace where this service is deployed
    backstage.io/kubernetes-id: python-test
    # Helm chart reference (optional)
    backstage.io/helm-chart: python-test
spec:
  type: service
  lifecycle: development
  owner: guests
  providesApis:
    - python-test-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: python-test-api
  description: REST API for python-test service
spec:
  type: openapi
  lifecycle: development
  owner: guests
  definition: |
    openapi: "3.0.0"
    info:
      title: python-test API
      version: "1.0"
    servers:
      - url: https://python-test.example.com
        description: Production
    paths:
      /api/v1/details:
        get:
          summary: Returns service details
          responses:
            "200":
              description: OK
      /api/v1/health:
        get:
          summary: Health check
          responses:
            "200":
              description: healthy
